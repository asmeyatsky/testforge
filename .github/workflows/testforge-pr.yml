name: TestForge PR Analysis

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  analyse:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install TestForge
        run: pip install -e .

      - name: Run analysis
        run: testforge analyse . --format json > /tmp/analysis.json

      - name: Generate strategy
        run: testforge strategise . --layers unit,integration --format json > /tmp/strategy.json

      - name: Run gap analysis
        run: testforge gaps . --format json > /tmp/gaps.json 2>/dev/null || true

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let analysis = {};
            let strategy = {};
            let gaps = {};

            try { analysis = JSON.parse(fs.readFileSync('/tmp/analysis.json', 'utf8')); } catch {}
            try { strategy = JSON.parse(fs.readFileSync('/tmp/strategy.json', 'utf8')); } catch {}
            try { gaps = JSON.parse(fs.readFileSync('/tmp/gaps.json', 'utf8')); } catch {}

            const body = [
              '## TestForge Analysis',
              '',
              '| Metric | Value |',
              '|--------|-------|',
              `| Modules | ${analysis.total_modules || 'N/A'} |`,
              `| Functions | ${analysis.total_functions || 'N/A'} |`,
              `| Classes | ${analysis.total_classes || 'N/A'} |`,
              `| Test Cases Planned | ${strategy.total_test_cases || 'N/A'} |`,
              `| Coverage | ${gaps.coverage_percent ? gaps.coverage_percent.toFixed(0) + '%' : 'N/A'} |`,
              '',
              '---',
              '*Generated by [TestForge](https://github.com/testforge)*',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
